spring.application.name=backend
server.port=8081

# MySQL Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/rentease_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# File Storage
app.upload-dir=../uploads

# Default superadmin credentials (override via ADMIN_EMAIL / ADMIN_PASSWORD in backend/.env)
app.admin.email=${ADMIN_EMAIL:admin@example.com}
app.admin.password=${ADMIN_PASSWORD:aaAA1234}

# JWT Config
app.jwt.secret=verysecretkeythatshouldbelongerthan256bitsverysecretkey
app.jwt.expiration=259200000

# Stripe Payment Gateway (keys loaded from backend/.env via spring-dotenv)
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# Email (SMTP credentials loaded from backend/.env via spring-dotenv)
spring.mail.host=${MAIL_HOST}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# OTP
app.otp.expiry-minutes=5

# OpenAPI Config
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
